<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Calories — Dans mon assiette</title>
  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- Nav -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">Dans mon assiette</a>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Changer le thème">☀️</button>
      <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="recettes.html">Recettes</a></li>
        <li><a href="calories.html" class="active">Mes Calories</a></li>
        <li><a href="sport.html">Sport</a></li>
        <li><a href="poids.html">Mon Poids</a></li>
      </ul>
    </div>
  </nav>

  <!-- Header -->
  <div class="cal-header">
    <h1>Mes Calories</h1>
    <div class="cal-stats">
      <div class="cal-stat">
        <div class="cal-stat-val" id="todayCal">0</div>
        <div class="cal-stat-lab">Mangées aujourd'hui</div>
      </div>
      <div class="cal-stat">
        <div class="cal-stat-val" id="todayBurned">0</div>
        <div class="cal-stat-lab">Brûlées aujourd'hui</div>
      </div>
      <div class="cal-stat">
        <div class="cal-stat-val" id="todayNet">0</div>
        <div class="cal-stat-lab">Nettes aujourd'hui</div>
      </div>
      <div class="cal-stat">
        <div class="cal-stat-val" id="weekCal">0</div>
        <div class="cal-stat-lab">Cette semaine (net)</div>
      </div>
      <div class="cal-stat">
        <div class="cal-stat-val" id="monthCal">0</div>
        <div class="cal-stat-lab">Ce mois (net)</div>
      </div>
    </div>
  </div>

  <div class="cal-content">

    <!-- Ajout manuel -->
    <div class="weight-form">
      <input type="text" id="manualName" placeholder="Nom du plat" class="manual-name-input">
      <input type="number" id="manualCal" placeholder="Calories" min="1" max="9999">
      <span>kcal</span>
      <input type="date" id="manualDate">
      <button class="btn btn-sm btn-primary" id="addManualBtn">Ajouter</button>
    </div>

    <!-- Period selector -->
    <div class="period-tabs">
      <button class="period-tab active" data-period="week">Semaine</button>
      <button class="period-tab" data-period="month">Mois</button>
      <button class="period-tab" data-period="all">Tout</button>
    </div>

    <!-- Chart -->
    <div class="chart-wrap">
      <canvas id="calChart"></canvas>
    </div>

    <!-- Goal -->
    <div class="goal-row">
      <label>Objectif journalier :</label>
      <input type="number" id="goalInput" value="1800" min="1000" max="4000">
      <span>kcal</span>
      <button class="btn btn-sm btn-primary" id="saveGoalBtn">Sauvegarder</button>
    </div>

    <!-- Recent days -->
    <div class="days-section">
      <h3>Derniers repas</h3>
      <div id="daysList"></div>
    </div>

    <!-- Actions -->
    <div class="cal-actions">
      <button class="btn btn-secondary" id="exportBtn">📄 Exporter</button>
      <button class="btn btn-danger" id="clearBtn">Effacer tout</button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Dans mon assiette — Prendre soin de toi, un plat à la fois.</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-db.js"></script>
  <script src="data.js"></script>
  <script>
  (function() {
    "use strict";

    let chart = null;
    let currentPeriod = "week";

    function getData() {
      return JSON.parse(localStorage.getItem("caloriesData") || "{}");
    }
    function getGoal() {
      return parseInt(localStorage.getItem("dailyGoal") || "1800");
    }
    function todayKey() {
      return new Date().toISOString().split("T")[0];
    }

    function dayTotal(entries) {
      return entries.reduce((sum, e) => sum + (e.calories || 0), 0);
    }

    // ── Calories brûlées (depuis le planning sport) ──
    function getDayKey(dateStr) {
      const days = ["dimanche", "lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi"];
      return days[new Date(dateStr).getDay()];
    }
    function getBurned(dateStr) {
      const sport = JSON.parse(localStorage.getItem("sportPlanning") || "{}");
      return parseInt(sport[getDayKey(dateStr)]?.calories || 0);
    }

    // ── Summary stats ──
    function updateSummary() {
      const data = getData();
      const today = todayKey();
      const todayEaten  = dayTotal(data[today] || []);
      const todayBurned = getBurned(today);
      document.getElementById("todayCal").textContent    = todayEaten;
      document.getElementById("todayBurned").textContent = todayBurned;
      document.getElementById("todayNet").textContent    = todayEaten - todayBurned;

      const now = new Date();
      let weekNet = 0, monthNet = 0;
      const allDates = new Set([
        ...Object.keys(data),
        ...Array.from({length: 7}, (_, i) => {
          const d = new Date(); d.setDate(d.getDate() - i);
          return d.toISOString().split("T")[0];
        })
      ]);
      allDates.forEach((key) => {
        const d = new Date(key);
        const diffDays = (now - d) / (1000 * 60 * 60 * 24);
        const net = dayTotal(data[key] || []) - getBurned(key);
        if (diffDays <= 7)  weekNet  += net;
        if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthNet += net;
      });
      document.getElementById("weekCal").textContent  = weekNet;
      document.getElementById("monthCal").textContent = monthNet;
    }

    // ── Chart ──
    function updateChart() {
      const data = getData();
      const goal = getGoal();
      const allDates = Object.keys(data).sort();

      let dates = allDates;
      const now = new Date();
      if (currentPeriod === "week") {
        dates = allDates.filter((d) => (now - new Date(d)) / 86400000 <= 7);
      } else if (currentPeriod === "month") {
        dates = allDates.filter((d) => {
          const dd = new Date(d);
          return dd.getMonth() === now.getMonth() && dd.getFullYear() === now.getFullYear();
        });
      }

      // Fill in missing days for week view
      if (currentPeriod === "week" && dates.length < 7) {
        const filled = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          filled.push(d.toISOString().split("T")[0]);
        }
        dates = filled;
      }

      const labels = dates.map((d) =>
        new Date(d).toLocaleDateString("fr-FR", { weekday: "short", day: "numeric" })
      );
      const values = dates.map((d) => Math.max(0, dayTotal(data[d] || []) - getBurned(d)));

      const colors = values.map((v) =>
        v > goal ? "rgba(193,122,74,.7)" : "rgba(94,122,82,.65)"
      );

      const datasets = [
        {
          type: "bar",
          label: "Calories",
          data: values,
          backgroundColor: colors,
          borderRadius: 6,
          barPercentage: 0.6,
          order: 2,
        },
        {
          type: "line",
          label: `Objectif (${goal} kcal)`,
          data: Array(labels.length).fill(goal),
          borderColor: "rgba(193,122,74,.9)",
          borderWidth: 2,
          borderDash: [6, 4],
          pointRadius: 0,
          fill: false,
          order: 1,
        },
      ];

      if (chart) {
        chart.data.labels = labels;
        chart.data.datasets[0].data = values;
        chart.data.datasets[0].backgroundColor = colors;
        chart.data.datasets[1].data = Array(labels.length).fill(goal);
        chart.data.datasets[1].label = `Objectif (${goal} kcal)`;
        chart.update();
      } else {
        const ctx = document.getElementById("calChart").getContext("2d");
        chart = new Chart(ctx, {
          type: "bar",
          data: { labels, datasets },
          options: {
            responsive: true,
            plugins: {
              legend: {
                display: true,
                labels: { font: { family: "Plus Jakarta Sans", size: 12 } },
              },
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: "rgba(0,0,0,.04)" },
                ticks: { font: { family: "Plus Jakarta Sans", size: 12 } },
              },
              x: {
                grid: { display: false },
                ticks: { font: { family: "Plus Jakarta Sans", size: 12 } },
              },
            },
          },
        });
      }
    }

    // ── Days list ──
    function updateDaysList() {
      const data = getData();
      const list = document.getElementById("daysList");
      const days = Object.keys(data).sort((a, b) => b.localeCompare(a)).slice(0, 14);

      if (days.length === 0) {
        list.innerHTML = '<p style="color:var(--c-text-3);padding:1rem 0">Clique « J\'ai mangé ça » depuis une recette pour commencer le suivi.</p>';
        return;
      }

      list.innerHTML = days.map((d) => {
        const total = dayTotal(data[d]);
        const label = new Date(d).toLocaleDateString("fr-FR", {
          weekday: "short", day: "numeric", month: "short"
        });
        const entries = data[d];
        const names = entries.map((e) => e.name).join(", ");
        return `
          <div class="day-entry">
            <div>
              <div class="day-date">${label}</div>
              <div style="font-size:.78rem;color:var(--c-text-3);margin-top:.15rem">${names}</div>
            </div>
            <div class="day-cals">${total} kcal</div>
          </div>`;
      }).join("");
    }

    // ── Ajout manuel ──
    document.getElementById("manualDate").value = todayKey();
    document.getElementById("addManualBtn").addEventListener("click", () => {
      const name = document.getElementById("manualName").value.trim();
      const cal  = parseInt(document.getElementById("manualCal").value);
      const date = document.getElementById("manualDate").value;
      if (!name || isNaN(cal) || cal <= 0 || !date) {
        showToast("Renseigne un nom, des calories et une date.");
        return;
      }
      const data = getData();
      if (!data[date]) data[date] = [];
      data[date].push({ name, calories: cal, time: new Date().toLocaleTimeString("fr-FR") });
      window.dbSet("caloriesData", JSON.stringify(data));
      document.getElementById("manualName").value = "";
      document.getElementById("manualCal").value  = "";
      updateSummary();
      updateChart();
      updateDaysList();
      showToast(`${name} ajouté ! +${cal} kcal`);
    });

    // ── Goal ──
    const goalInput = document.getElementById("goalInput");
    goalInput.value = getGoal();
    document.getElementById("saveGoalBtn").addEventListener("click", () => {
      window.dbSet("dailyGoal", goalInput.value);
      updateChart();
      showToast("Objectif sauvegardé");
    });

    // ── Period tabs ──
    document.querySelectorAll(".period-tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelector(".period-tab.active").classList.remove("active");
        btn.classList.add("active");
        currentPeriod = btn.dataset.period;
        updateChart();
      });
    });

    // ── Export ──
    document.getElementById("exportBtn").addEventListener("click", () => {
      const data = getData();
      const lines = ["Date,Recette,Calories"];
      Object.entries(data).sort().forEach(([date, entries]) => {
        entries.forEach((e) => {
          lines.push(`${date},${e.name},${e.calories}`);
        });
      });
      const blob = new Blob([lines.join("\n")], { type: "text/csv" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `calories-${todayKey()}.csv`;
      a.click();
      showToast("Export CSV téléchargé");
    });

    // ── Clear ──
    document.getElementById("clearBtn").addEventListener("click", () => {
      if (confirm("Effacer toutes les données de calories ?")) {
        window.dbRemove("caloriesData");
        updateSummary();
        updateChart();
        updateDaysList();
        showToast("Données effacées");
      }
    });

    // ── Toast ──
    function showToast(msg) {
      const el = document.createElement("div");
      el.className = "toast";
      el.textContent = msg;
      document.body.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add("show")));
      setTimeout(() => { el.classList.remove("show"); setTimeout(() => el.remove(), 400); }, 2500);
    }

    // ── Sync Firestore → re-render ──
    window.__onDbSync = function () {
      updateSummary();
      updateChart();
      updateDaysList();
    };

    // ── Init ──
    updateSummary();
    updateChart();
    updateDaysList();
  })();
  </script>
</body>
</html>
